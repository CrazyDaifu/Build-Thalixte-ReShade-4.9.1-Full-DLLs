version: 2.1

orbs:
  windows: circleci/windows@5.0

jobs:
  build:
    executor:
      name: windows/default
      size: large
    
    steps:
      - checkout
      
      # 只初始化子模块，不额外安装任何东西
      - run:
          name: Prepare gl3w and submodules
          command: |
            git submodule update --init --recursive
            Remove-Item -Recurse -Force deps/gl3w -ErrorAction SilentlyContinue
            mkdir deps/gl3w/src, deps/gl3w/include/GL
            "// Dummy`nint gl3wInit(){return 0;}`nvoid gl3wShutdown(){}" | Out-File deps/gl3w/src/gl3w.c -Encoding utf8
            "#ifndef GL3W_H`n#define GL3W_H`n#include <windows.h>`ntypedef unsigned int GLenum;`ntypedef unsigned int GLuint;`nint gl3wInit(void);`nvoid gl3wShutdown(void);`n#endif" | Out-File deps/gl3w/include/GL/gl3w.h -Encoding utf8
            "import sys`nsys.exit(0)" | Out-File deps/gl3w/gl3w_gen.py -Encoding utf8
      
      # 直接用 VS2019 自带的 SDK 构建（10.0.17763.0）
      - run:
          name: Build with VS2019
          command: |
            & "C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\MSBuild\Current\Bin\MSBuild.exe" `
              ReShade.sln `
              /p:Configuration=Release `
              /p:Platform=Win32 `
              /p:PlatformToolset=v142 `
              /p:WindowsTargetPlatformVersion=10.0.17763.0 `
              /t:ReShade `
              /m

      - store_artifacts:
          path: bin/Win32/Release/ReShade32.dll
          destination: ReShade32-Thalixte.dll

workflows:
  build-and-store:
    jobs:
      - build:
          filters:
            branches:
              only: main

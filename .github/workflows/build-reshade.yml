name: Build Thalixte ReShade 32-bit Only

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Windows SDK 10.0.17763.0 (compatible)
      shell: powershell
      run: |
        choco install windows-sdk-10.1 -y --version=10.0.17763
        # 或者使用 Visual Studio Installer 添加组件
        & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" modify `
          --installPath "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" `
          --add Microsoft.VisualStudio.Component.Windows10SDK.17763 `
          --quiet --norestart

    - name: Remove gl3w submodule and create dummy files
      shell: cmd
      run: |
        rmdir /s /q deps\gl3w
        mkdir deps\gl3w\src
        mkdir deps\gl3w\include\GL
        echo // Dummy > deps\gl3w\src\gl3w.c
        echo #include ^<windows.h^> > deps\gl3w\include\GL\gl3w.h
        echo typedef unsigned int GLenum; >> deps\gl3w\include\GL\gl3w.h
        echo typedef unsigned int GLuint; >> deps\gl3w\include\GL\gl3w.h
        echo int gl3wInit(void) { return 0; } >> deps\gl3w\src\gl3w.c
        echo import sys > deps\gl3w\gl3w_gen.py
        echo sys.exit(0) >> deps\gl3w\gl3w_gen.py

    - name: Fix project files and force SDK version
      shell: powershell
      run: |
        Get-ChildItem -Recurse -Filter "*.vcxproj" | ForEach-Object {
          $content = Get-Content $_.FullName -Raw
          # 强制设置 SDK 版本为 10.0.17763.0
          $content = $content -replace '<WindowsTargetPlatformVersion>[^<]+</WindowsTargetPlatformVersion>', '<WindowsTargetPlatformVersion>10.0.17763.0</WindowsTargetPlatformVersion>'
          # 删除 D3D12 和 OpenGL 文件
          $content = $content -replace '<ClCompile Include="source\\d3d12\\[^"]*"\s*/?>\s*', ''
          $content = $content -replace '<ClInclude Include="source\\d3d12\\[^"]*"\s*/?>\s*', ''
          $content = $content -replace '<ClCompile Include="source\\opengl\\[^"]*"\s*/?>\s*', ''
          $content = $content -replace '<ClInclude Include="source\\opengl\\[^"]*"\s*/?>\s*', ''
          Set-Content $_.FullName $content -NoNewline
        }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build ReShade 32-bit
      shell: cmd
      run: |
        msbuild ReShade.sln ^
          /p:Configuration=Release ^
          /p:Platform="32-bit" ^
          /p:PlatformToolset=v143 ^
          /p:WindowsTargetPlatformVersion=10.0.17763.0 ^
          /t:"ReShade";"ReShade FX";"gl3w";"ImGui";"MinHook";"stb";"FXC";"Injector" ^
          /m

    - name: Collect 32-bit DLLs
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path "output_32bit"
        $paths = @("bin\Win32\Release\ReShade32.dll","bin\32-bit\Release\ReShade32.dll","bin\Release\Win32\ReShade32.dll")
        foreach ($p in $paths) {
          if (Test-Path $p) {
            Copy-Item $p "output_32bit\"
            Write-Host "Found: $p"
          }
        }
        if (-not (Test-Path "output_32bit\ReShade32.dll")) {
          Get-ChildItem -Path "bin" -Recurse | Select-Object FullName
          exit 1
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Thalixte-ReShade-32bit
        path: output_32bit/
        retention-days: 30

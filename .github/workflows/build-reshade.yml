name: Build Thalixte ReShade 4.9.1 Full DLLs
on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-reshade:
    runs-on: windows-2022
    defaults:
      run:
        shell: powershell
        working-directory: ${{ github.workspace }}
    steps:
      # Step 1: Checkout full source code with all submodules
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          clean: true

      # Step 2: Setup Python for gl3w dependency generation
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      # Step 3: Generate gl3w binding code (required for ReShade 4.x build)
      - name: Generate gl3w Dependencies
        run: |
          if (Test-Path -Path "deps/gl3w") {
            Set-Location deps/gl3w
            python gl3w_gen.py
            Write-Host "gl3w code generated successfully"
          } else {
            Write-Host "gl3w directory not found, skip generation (submodule may be missing)"
            exit 1
          }

      # Step 4: Setup MSBuild for Visual Studio 2022
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'
          msbuild-architecture: x64

      # Step 5: Build 32-bit (Win32) Release
      - name: Build 32-bit Release
        run: |
          msbuild ReShade.sln /t:Build /p:Configuration=Release /p:Platform=Win32 /p:PreferredToolArchitecture=x64 /m:8
          Write-Host "32-bit build completed"

      # Step 6: Build 64-bit (x64) Release
      - name: Build 64-bit Release
        run: |
          msbuild ReShade.sln /t:Build /p:Configuration=Release /p:Platform=x64 /p:PreferredToolArchitecture=x64 /m:8
          Write-Host "64-bit build completed"

      # Step 7: Organize build artifacts
      - name: Organize Artifacts
        run: |
          $outputRoot = "Thalixte_ReShade_4.9.1_Full_DLLs"
          New-Item -ItemType Directory -Force -Path "$outputRoot/32bit"
          New-Item -ItemType Directory -Force -Path "$outputRoot/64bit"
          
          Copy-Item -Path "bin/Win32/Release/*.dll" -Destination "$outputRoot/32bit/" -Force
          Copy-Item -Path "bin/x64/Release/*.dll" -Destination "$outputRoot/64bit/" -Force
          
          Write-Host "===== 32-bit Artifacts ====="
          Get-ChildItem "$outputRoot/32bit"
          Write-Host "===== 64-bit Artifacts ====="
          Get-ChildItem "$outputRoot/64bit"

      # Step 8: Upload build artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Thalixte_ReShade_4.9.1_Full_DLLs
          path: Thalixte_ReShade_4.9.1_Full_DLLs/
          retention-days: 90

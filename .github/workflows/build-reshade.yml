name: Build Thalixte ReShade 32-bit Only

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Windows SDK 10.0.19041.0 (Win10 2004)
      shell: powershell
      run: |
        $url = "https://go.microsoft.com/fwlink/?linkid=2120843"  # Win10 SDK 2004 (19041)
        $output = "C:\temp\winsdk.exe"
        New-Item -ItemType Directory -Force -Path "C:\temp"
        Invoke-WebRequest -Uri $url -OutFile $output
        Start-Process -FilePath $output -ArgumentList "/quiet /norestart" -Wait

    - name: Remove gl3w submodule and create dummy files
      shell: cmd
      run: |
        rmdir /s /q deps\gl3w
        mkdir deps\gl3w\src
        mkdir deps\gl3w\include\GL
        echo // Dummy > deps\gl3w\src\gl3w.c
        echo #include ^<windows.h^> > deps\gl3w\include\GL\gl3w.h
        echo typedef unsigned int GLenum; >> deps\gl3w\include\GL\gl3w.h
        echo typedef unsigned int GLuint; >> deps\gl3w\include\GL\gl3w.h
        echo int gl3wInit(void) { return 0; } >> deps\gl3w\src\gl3w.c
        echo import sys > deps\gl3w\gl3w_gen.py
        echo sys.exit(0) >> deps\gl3w\gl3w_gen.py

    - name: Fix SDK version in project files
      shell: powershell
      run: |
        Get-ChildItem -Recurse -Filter "*.vcxproj" | ForEach-Object {
          $content = Get-Content $_.FullName -Raw
          $content = $content -replace '<WindowsTargetPlatformVersion>[^<]+</WindowsTargetPlatformVersion>', '<WindowsTargetPlatformVersion>10.0.19041.0</WindowsTargetPlatformVersion>'
          Set-Content $_.FullName $content -NoNewline
        }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build ReShade 32-bit
      shell: cmd
      run: |
        msbuild ReShade.sln ^
          /p:Configuration=Release ^
          /p:Platform="32-bit" ^
          /p:PlatformToolset=v143 ^
          /p:WindowsTargetPlatformVersion=10.0.19041.0 ^
          /t:"ReShade";"ReShade FX";"gl3w";"ImGui";"MinHook";"stb";"FXC";"Injector" ^
          /m

    - name: Collect 32-bit DLLs
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path "output_32bit"
        $paths = @("bin\Win32\Release\ReShade32.dll","bin\32-bit\Release\ReShade32.dll","bin\Release\Win32\ReShade32.dll")
        foreach ($p in $paths) {
          if (Test-Path $p) {
            Copy-Item $p "output_32bit\"
            Write-Host "Found: $p"
          }
        }
        if (-not (Test-Path "output_32bit\ReShade32.dll")) {
          Get-ChildItem -Path "bin" -Recurse | Select-Object FullName
          exit 1
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Thalixte-ReShade-32bit
        path: output_32bit/
        retention-days: 30

name: Build Thalixte ReShade 32-bit Only

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout with submodules (excluding gl3w)
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Remove gl3w submodule and create dummy files
      shell: cmd
      run: |
        :: 删除 gl3w 子模块（避免 403 错误）
        rmdir /s /q deps\gl3w
        mkdir deps\gl3w\src
        mkdir deps\gl3w\include\GL
        
        :: 创建空的 gl3w.c
        echo // Dummy gl3w.c > deps\gl3w\src\gl3w.c
        echo #include ^<GL/gl3w.h^> >> deps\gl3w\src\gl3w.c
        echo int gl3wInit(void) { return 0; } >> deps\gl3w\src\gl3w.c
        echo void gl3wShutdown(void) {} >> deps\gl3w\src\gl3w.c
        
        :: 创建空的 gl3w.h
        echo // Dummy gl3w.h > deps\gl3w\include\GL\gl3w.h
        echo #ifndef GL3W_H >> deps\gl3w\include\GL\gl3w.h
        echo #define GL3W_H >> deps\gl3w\include\GL\gl3w.h
        echo #include ^<GL/glcorearb.h^> >> deps\gl3w\include\GL\gl3w.h
        echo int gl3wInit(void); >> deps\gl3w\include\GL\gl3w.h
        echo void gl3wShutdown(void); >> deps\gl3w\include\GL\gl3w.h
        echo #endif >> deps\gl3w\include\GL\gl3w.h
        
        :: 创建空的 glcorearb.h
        echo // Dummy glcorearb.h > deps\gl3w\include\GL\glcorearb.h
        echo #ifndef GLCOREARB_H >> deps\gl3w\include\GL\glcorearb.h
        echo #define GLCOREARB_H >> deps\gl3w\include\GL\glcorearb.h
        echo #include ^<windows.h^> >> deps\gl3w\include\GL\glcorearb.h
        echo typedef unsigned int GLenum; >> deps\gl3w\include\GL\glcorearb.h
        echo typedef unsigned int GLuint; >> deps\gl3w\include\GL\glcorearb.h
        echo #endif >> deps\gl3w\include\GL\glcorearb.h
        
        :: 创建空的 gl3w_gen.py
        echo import sys > deps\gl3w\gl3w_gen.py
        echo print("skipped") >> deps\gl3w\gl3w_gen.py
        echo sys.exit(0) >> deps\gl3w\gl3w_gen.py

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Remove Windows SDK version restriction
      shell: powershell
      run: |
        Get-ChildItem -Recurse -Filter "*.vcxproj" | ForEach-Object {
          $content = Get-Content $_.FullName -Raw
          $original = $content
          $content = $content -replace '<WindowsTargetPlatformVersion>.*?</WindowsTargetPlatformVersion>\s*', ''
          if ($content -ne $original) {
            Set-Content $_.FullName $content -NoNewline
          }
        }

    - name: Build ReShade 32-bit
      shell: cmd
      run: |
        msbuild ReShade.sln ^
          /p:Configuration=Release ^
          /p:Platform="32-bit" ^
          /p:PlatformToolset=v143 ^
          /t:"ReShade";"ReShade FX";"gl3w";"ImGui";"MinHook";"stb";"FXC";"Injector" ^
          /m ^
          /verbosity:minimal

    - name: Collect 32-bit DLLs
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path "output_32bit"
        $paths = @("bin\32-bit\Release\ReShade32.dll","bin\Win32\Release\ReShade32.dll","bin\Release\Win32\ReShade32.dll")
        foreach ($p in $paths) {
          if (Test-Path $p) {
            Copy-Item $p "output_32bit\"
            Write-Host "Found: $p"
          }
        }
        if (-not (Test-Path "output_32bit\ReShade32.dll")) {
          Get-ChildItem -Path "bin" -Recurse | Select-Object FullName
          exit 1
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Thalixte-ReShade-32bit
        path: output_32bit/
        retention-days: 30

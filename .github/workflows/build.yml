name: Build Thalixte Reshade

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86
    
    - name: Build with default configuration
      shell: pwsh
      run: |
        # 先列出可用的配置
        msbuild ReShade.sln /p:Configuration=Release /p:Platform=x86 2>&1 | Tee-Object build.log
        if ($LASTEXITCODE -ne 0) {
          # 尝试Win32
          msbuild ReShade.sln /p:Configuration=Release /p:Platform=Win32
        }
        if ($LASTEXITCODE -ne 0) {
          # 尝试不带平台参数（使用默认）
          msbuild ReShade.sln /p:Configuration=Release
        }
    
    - name: Find DLL
      shell: pwsh
      run: |
        $dll = Get-ChildItem -Recurse -Filter "ReShade.dll" | Select-Object -First 1
        if ($dll) {
          Copy-Item $dll.FullName "ReShade_Thalixte_x86.dll"
          Write-Host "Found: $($dll.FullName)" -ForegroundColor Green
        }
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ReShade-Thalixte-x86
        path: ReShade_Thalixte_x86.dll

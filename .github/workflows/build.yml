name: Build Thalixte ReShade 32-bit Only

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨自动构建

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    # 1. 检出代码（递归子模块 - gl3w 需要）
    - name: Checkout with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    # 2. 安装 Python（gl3w 生成需要）
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. 安装 MSBuild (VS2022)
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: '[17.0,18.0)'

    # 4. 构建 32-bit Release（仅 ReShade 核心项目）
    # 根据 sln 文件，Release|Win32 会构建所有依赖项
    - name: Build ReShade 32-bit
      run: |
        msbuild ReShade.sln `
          /p:Configuration=Release `
          /p:Platform=Win32 `
          /t:ReShade;ReShade FX;gl3w;ImGui;MinHook;stb;FXC;Injector `
          /m `
          /verbosity:minimal

    # 5. 收集 32 位 DLL 文件
    - name: Collect 32-bit DLLs
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path "output_32bit"
        
        # 根据 ReShade 标准输出路径（bin/Win32/ 或 bin/Release/Win32/）
        $sourcePaths = @(
          "bin\Win32\Release\ReShade32.dll",
          "bin\Win32\ReShade32.dll", 
          "bin\Release\Win32\ReShade32.dll",
          "bin\Win32\Release\ReShadeInject32.exe",
          "bin\Win32\ReShadeInject32.exe"
        )
        
        foreach ($path in $sourcePaths) {
          if (Test-Path $path) {
            Copy-Item $path "output_32bit\" -Force
            Write-Host "Found: $path"
          }
        }
        
        # 列出实际输出目录结构帮助调试
        Write-Host "`n=== Bin directory structure ==="
        Get-ChildItem -Path "bin" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName

    # 6. 上传到 Artifacts（保留 30 天）
    - name: Upload 32-bit DLL
      uses: actions/upload-artifact@v4
      with:
        name: Thalixte-ReShade-32bit-${{ github.run_number }}
        path: output_32bit/
        retention-days: 30

    # 7. 创建 GitHub Release（可选，只在 push 到 main 时）
    - name: Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: win32-build-${{ github.run_number }}
        name: Thalixte ReShade 32-bit Build ${{ github.run_number }}
        body: |
          **仅包含 32 位 (x86) 版本 DLL**
          
          文件说明：
          - `ReShade32.dll` - 主文件，使用时根据游戏 API 重命名为：
            - DirectX 9: `d3d9.dll`
            - DirectX 10/11: `dxgi.dll` 或 `d3d11.dll`
            - DirectX 12: `dxgi.dll`
            - OpenGL: `opengl32.dll`
          - `ReShadeInject32.exe` - 注入器工具（如需使用）
          
          自动构建时间：${{ github.event.head_commit.timestamp }}
        files: output_32bit/*
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
